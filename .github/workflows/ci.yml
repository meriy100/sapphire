name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check / fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml pins the channel (1.85.0) and components
        # (rustfmt, clippy). `rustup show` honours it on the first
        # invocation, which also materialises the toolchain.
        run: rustup show

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo check --all
        run: cargo check --all

      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --all
        run: cargo test --all

  runtime:
    name: sapphire-runtime gem / rspec
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        # Matches runtime/sapphire-runtime.gemspec `required_ruby_version`.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: runtime

      - name: bundle exec rspec
        run: bundle exec rspec
